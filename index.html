<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Build Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="app"></canvas>

    <div id="ui-panel" class="ui-panel">
      <div class="ui-track"></div>
      <div id="slots" class="slots"></div>
    </div>

    <div id="debug-editor" class="debug-editor">
      <div class="debug-title">Level Debug</div>
      <label class="debug-row">
        <span>Mode</span>
        <input id="editor-enabled" type="checkbox" />
      </label>
      <label class="debug-row">
        <span>Block</span>
        <select id="editor-block">
          <option value="stone">Stone</option>
          <option value="wood">Wood</option>
          <option value="grass">Grass</option>
          <option value="erase">Erase</option>
        </select>
      </label>
      <label class="debug-row">
        <span>Layer Y</span>
        <input id="editor-layer" type="number" min="0" max="8" value="0" />
      </label>
      <div class="debug-actions">
        <button id="editor-clear" type="button">Clear</button>
        <button id="editor-export" type="button">Export JSON</button>
        <button id="editor-apply" type="button">Use As Target</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js"></script>
    <script src="./js/prototype/texture-data.js"></script>
    <script src="./js/prototype/app.js?v=20260318-07"></script>
  </body>
</html>
