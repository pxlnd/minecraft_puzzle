<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scene Builder</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1218;
        color: #ecf1f8;
        font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
      }
      .box {
        background: #171c25;
        border: 1px solid #2a2f3a;
        border-radius: 12px;
        padding: 24px;
        width: min(560px, 92vw);
      }
      h1 {
        margin: 0 0 12px;
      }
      p {
        color: #99a3b5;
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      a {
        display: inline-block;
        text-decoration: none;
        color: #ecf1f8;
        border: 1px solid #2a2f3a;
        border-radius: 8px;
        padding: 10px 14px;
        background: #121722;
      }
      a:hover {
        border-color: #43baff;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Local 2D Scene Builder</h1>
      <p>Выберите режим: редактор для сборки сцены или runtime для просмотра JSON как игровой сцены.</p>
      <div class="row">
        <a href="./editor.html">Open Editor</a>
        <a href="./runtime.html">Open Runtime</a>
      </div>
    </div>
  </body>
</html>
