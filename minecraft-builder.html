<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Builder</title>
  <style>
    :root {
      --ui-bg: rgba(12, 17, 25, 0.72);
      --ui-border: rgba(255, 255, 255, 0.2);
      --ui-text: #e8edf6;
      --accent: #7fd16a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 50% 20%, #5b83b9 0%, #2f4f77 45%, #1e2f46 100%);
      color: var(--ui-text);
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 10;
      padding: 12px 14px;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      line-height: 1.35;
      font-size: 14px;
      max-width: min(440px, calc(100vw - 32px));
    }

    .hud strong {
      color: #fff;
    }

    .crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
      z-index: 11;
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.45);
    }

    .crosshair::before {
      width: 2px;
      height: 20px;
      left: 9px;
      top: 0;
    }

    .crosshair::after {
      width: 20px;
      height: 2px;
      left: 0;
      top: 9px;
    }

    .hotbar {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 12;
      display: flex;
      gap: 8px;
      padding: 8px;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    .slot {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.22);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      user-select: none;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .slot.active {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4), 0 0 10px rgba(127, 209, 106, 0.45);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 20;
      background: rgba(5, 8, 12, 0.55);
    }

    .overlay button {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: rgba(28, 35, 48, 0.95);
      color: #fff;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .overlay button:hover {
      border-color: var(--accent);
    }

    @media (max-width: 700px) {
      .hud {
        font-size: 12px;
        padding: 10px;
      }

      .slot {
        width: 44px;
        height: 44px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="hud">
    <div><strong>Построй дом в 3D</strong></div>
    <div>Клик по кнопке ниже, чтобы захватить мышь.</div>
    <div><strong>WASD</strong> - ходить, <strong>Space / Shift</strong> - вверх/вниз</div>
    <div><strong>ЛКМ</strong> - поставить блок, <strong>ПКМ</strong> - удалить</div>
    <div><strong>1-5</strong> - выбрать тип блока, <strong>R</strong> - сброс мира</div>
    <div>Выбрано: <span id="currentBlock">Трава</span></div>
  </div>

  <div class="crosshair"></div>

  <div class="hotbar" id="hotbar"></div>

  <div class="overlay" id="overlay">
    <button id="startBtn">Начать строительство</button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
    import { PointerLockControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/PointerLockControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 25, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 6, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.domElement.tabIndex = 0;
    renderer.domElement.style.outline = 'none';
    document.body.appendChild(renderer.domElement);

    const controls = new PointerLockControls(camera, renderer.domElement);
    scene.add(controls.getObject());

    const ambient = new THREE.HemisphereLight(0xffffff, 0x6b8a52, 0.65);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(35, 50, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.left = -70;
    sun.shadow.camera.right = 70;
    sun.shadow.camera.top = 70;
    sun.shadow.camera.bottom = -70;
    scene.add(sun);

    const blockGeom = new THREE.BoxGeometry(1, 1, 1);

    const blockTypes = [
      { name: 'Трава', color: 0x6fbf4b, top: 0x82d655 },
      { name: 'Камень', color: 0x8a8d90, top: 0x9da0a4 },
      { name: 'Доски', color: 0xb57f4f, top: 0xc9965f },
      { name: 'Кирпич', color: 0xa04f44, top: 0xb65b50 },
      { name: 'Стекло', color: 0x88d7f6, top: 0xb4ecff, opacity: 0.5 }
    ];

    function createMaterialSet(type) {
      return [
        new THREE.MeshLambertMaterial({ color: type.color, transparent: !!type.opacity, opacity: type.opacity || 1 }),
        new THREE.MeshLambertMaterial({ color: type.color, transparent: !!type.opacity, opacity: type.opacity || 1 }),
        new THREE.MeshLambertMaterial({ color: type.top, transparent: !!type.opacity, opacity: type.opacity || 1 }),
        new THREE.MeshLambertMaterial({ color: type.color, transparent: !!type.opacity, opacity: type.opacity || 1 }),
        new THREE.MeshLambertMaterial({ color: type.color, transparent: !!type.opacity, opacity: type.opacity || 1 }),
        new THREE.MeshLambertMaterial({ color: type.color, transparent: !!type.opacity, opacity: type.opacity || 1 })
      ];
    }

    const world = new Map();
    const blocksGroup = new THREE.Group();
    scene.add(blocksGroup);

    const groundMat = createMaterialSet(blockTypes[0]);
    const groundSize = 30;

    function keyFor(x, y, z) {
      return `${x},${y},${z}`;
    }

    function addBlock(x, y, z, typeIndex = 0, force = false) {
      const key = keyFor(x, y, z);
      if (world.has(key) && !force) return false;

      if (force && world.has(key)) {
        removeBlock(x, y, z);
      }

      const block = new THREE.Mesh(blockGeom, createMaterialSet(blockTypes[typeIndex]));
      block.position.set(x + 0.5, y + 0.5, z + 0.5);
      block.castShadow = true;
      block.receiveShadow = true;
      block.userData.grid = { x, y, z, typeIndex };
      blocksGroup.add(block);
      world.set(key, block);
      return true;
    }

    function removeBlock(x, y, z) {
      const key = keyFor(x, y, z);
      const block = world.get(key);
      if (!block) return false;
      blocksGroup.remove(block);
      world.delete(key);
      return true;
    }

    function generateGround() {
      for (let x = -groundSize; x <= groundSize; x++) {
        for (let z = -groundSize; z <= groundSize; z++) {
          addBlock(x, 0, z, 0);
        }
      }
    }

    function clearBuiltBlocks() {
      for (const [key, block] of [...world.entries()]) {
        if (block.userData.grid.y > 0) {
          blocksGroup.remove(block);
          world.delete(key);
        }
      }
    }

    generateGround();

    const raycaster = new THREE.Raycaster();
    const dir = new THREE.Vector3();

    const move = {
      forward: false,
      backward: false,
      left: false,
      right: false,
      up: false,
      down: false
    };

    const velocity = new THREE.Vector3();
    const walkSpeed = 9;

    let selectedType = 0;

    const currentBlockEl = document.getElementById('currentBlock');
    const hotbarEl = document.getElementById('hotbar');

    function refreshSelectedText() {
      currentBlockEl.textContent = blockTypes[selectedType].name;
      [...hotbarEl.children].forEach((el, idx) => {
        el.classList.toggle('active', idx === selectedType);
      });
    }

    function buildHotbar() {
      blockTypes.forEach((type, idx) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.style.background = `linear-gradient(160deg, #ffffff20, #00000030), #${type.color.toString(16).padStart(6, '0')}`;
        slot.textContent = `${idx + 1}`;
        slot.title = type.name;
        slot.addEventListener('click', () => {
          selectedType = idx;
          refreshSelectedText();
        });
        hotbarEl.appendChild(slot);
      });
      refreshSelectedText();
    }

    buildHotbar();

    function setMovement(code, active) {
      if (code === 'KeyW') move.forward = active;
      if (code === 'KeyS') move.backward = active;
      if (code === 'KeyA') move.left = active;
      if (code === 'KeyD') move.right = active;
      if (code === 'Space') move.up = active;
      if (code === 'ShiftLeft' || code === 'ShiftRight') move.down = active;
    }

    document.addEventListener('keydown', (e) => {
      setMovement(e.code, true);

      if (e.code.startsWith('Digit')) {
        const n = Number(e.code.replace('Digit', ''));
        if (n >= 1 && n <= blockTypes.length) {
          selectedType = n - 1;
          refreshSelectedText();
        }
      }

      if (e.code === 'KeyR') {
        clearBuiltBlocks();
      }
    });

    document.addEventListener('keyup', (e) => {
      setMovement(e.code, false);
    });

    function hitTest() {
      camera.getWorldDirection(dir);
      raycaster.set(camera.position, dir);
      raycaster.far = 8;
      return raycaster.intersectObjects(blocksGroup.children, false)[0] || null;
    }

    function tryPlaceBlock() {
      const hit = hitTest();
      if (!hit) return;

      const point = hit.point.clone().addScaledVector(hit.face.normal, 0.51);
      const x = Math.floor(point.x);
      const y = Math.floor(point.y);
      const z = Math.floor(point.z);

      if (y < 1 || y > 80) return;

      const camPos = camera.position;
      if (
        x <= camPos.x && camPos.x <= x + 1 &&
        y <= camPos.y && camPos.y <= y + 1 &&
        z <= camPos.z && camPos.z <= z + 1
      ) {
        return;
      }

      addBlock(x, y, z, selectedType);
    }

    function tryRemoveBlock() {
      const hit = hitTest();
      if (!hit) return;
      const { x, y, z } = hit.object.userData.grid;
      if (y === 0) return;
      removeBlock(x, y, z);
    }

    window.addEventListener('contextmenu', (e) => e.preventDefault());

    document.addEventListener('mousedown', (e) => {
      if (!controls.isLocked) return;
      if (e.button === 0) {
        tryPlaceBlock();
      } else if (e.button === 2) {
        tryRemoveBlock();
      }
    });

    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');

    function requestPointerLockSafe() {
      renderer.domElement.focus();
      if (renderer.domElement.requestPointerLock) {
        renderer.domElement.requestPointerLock();
      } else {
        controls.lock();
      }
    }

    startBtn.addEventListener('click', () => {
      requestPointerLockSafe();
    });

    renderer.domElement.addEventListener('click', () => {
      if (!controls.isLocked) requestPointerLockSafe();
    });

    controls.addEventListener('lock', () => {
      overlay.style.display = 'none';
    });

    controls.addEventListener('unlock', () => {
      overlay.style.display = 'grid';
    });

    document.addEventListener('pointerlockerror', () => {
      startBtn.textContent = 'Не удалось захватить мышь (запусти через localhost)';
    });

    document.addEventListener('pointerlockchange', () => {
      if (document.pointerLockElement === renderer.domElement) {
        overlay.style.display = 'none';
      } else if (!controls.isLocked) {
        overlay.style.display = 'grid';
      }
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      velocity.set(0, 0, 0);

      if (move.forward) velocity.z -= 1;
      if (move.backward) velocity.z += 1;
      if (move.left) velocity.x -= 1;
      if (move.right) velocity.x += 1;
      if (move.up) velocity.y += 1;
      if (move.down) velocity.y -= 1;

      if (velocity.lengthSq() > 0) {
        velocity.normalize().multiplyScalar(walkSpeed * dt);
        controls.moveRight(velocity.x);
        controls.moveForward(-velocity.z);
        camera.position.y += velocity.y;
      }

      camera.position.y = THREE.MathUtils.clamp(camera.position.y, 1.6, 60);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
