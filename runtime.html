<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scene Runtime</title>
    <link rel="stylesheet" href="./runtime.css" />
  </head>
  <body data-mode="runtime">
    <div class="layout">
      <aside class="panel">
        <h1>Runtime Mode</h1>
        <p>Вставьте JSON сцены и нажмите Apply.</p>
        <div class="row">
          <button id="applyBtn">Apply JSON</button>
          <button id="loadLastBtn">Load Last Editor Scene</button>
          <button id="fitBtn">Fit</button>
        </div>
        <textarea id="jsonInput" placeholder="Paste scene JSON"></textarea>
      </aside>
      <main class="stage-wrap">
        <canvas id="runtimeCanvas"></canvas>
      </main>
    </div>
    <script type="module" src="./js/runtime.js"></script>
  </body>
</html>
