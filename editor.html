<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scene Builder Editor</title>
    <link rel="stylesheet" href="./editor.css" />
  </head>
  <body data-mode="editor">
    <div class="app">
      <aside class="sidebar left-panel">
        <div class="panel-header">Assets</div>
        <div class="btn-group-vertical">
          <label id="addAssetFilesBtn" class="btn" for="assetFileInput">Add Files</label>
        </div>
        <input id="assetFileInput" class="visually-hidden" type="file" accept="image/*" multiple />
        <div class="subtle">Файлы лучше хранить в `assets/`</div>
        <input id="assetSearch" class="input" type="text" placeholder="Search asset..." />
        <div id="assetList" class="asset-list"></div>
      </aside>

      <main class="workspace">
        <header class="toolbar">
          <div class="toolbar-group">
            <button id="newSceneBtn" class="btn">New</button>
            <button id="undoBtn" class="btn">Undo</button>
            <button id="redoBtn" class="btn">Redo</button>
            <button id="duplicateBtn" class="btn">Duplicate</button>
            <button id="deleteBtn" class="btn danger">Delete</button>
          </div>

          <div class="toolbar-group">
            <button id="sendToBackBtn" class="btn">To Back</button>
            <button id="sendBackwardBtn" class="btn">Backward</button>
            <button id="bringForwardBtn" class="btn">Forward</button>
            <button id="bringToFrontBtn" class="btn">To Front</button>
          </div>

          <div class="toolbar-group">
            <label class="inline-label">Zoom</label>
            <input id="zoomRange" type="range" min="10" max="400" value="100" />
            <span id="zoomValue" class="badge">100%</span>
            <button id="fitViewBtn" class="btn">Fit</button>
          </div>

          <div class="toolbar-group">
            <label class="inline-check"><input id="showGridToggle" type="checkbox" checked /> Grid</label>
            <label class="inline-check"><input id="snapToggle" type="checkbox" /> Snap</label>
          </div>
        </header>

        <section class="canvas-wrap" id="canvasWrap">
          <canvas id="sceneCanvas"></canvas>
        </section>

        <footer class="status-bar">
          <span id="statusText">Ready</span>
          <span id="selectionText">No selection</span>
          <span id="mouseText">x:0 y:0</span>
        </footer>
      </main>

      <aside class="sidebar right-panel">
        <div class="panel-header">Scene</div>
        <div class="property-grid compact">
          <label>Name<input id="sceneName" class="input" type="text" /></label>
          <label>Width<input id="sceneWidth" class="input" type="number" min="1" step="1" /></label>
          <label>Height<input id="sceneHeight" class="input" type="number" min="1" step="1" /></label>
          <label>Grid<input id="gridSize" class="input" type="number" min="2" step="1" /></label>
        </div>

        <div class="panel-header">Selection</div>
        <div id="selectionMeta" class="subtle">No object selected</div>

        <div class="property-grid" id="propertyForm">
          <label>Name<input data-prop="name" class="input" type="text" /></label>
          <label>X<input data-prop="x" class="input" type="number" step="1" /></label>
          <label>Y<input data-prop="y" class="input" type="number" step="1" /></label>
          <label>Width<input data-prop="width" class="input" type="number" step="1" min="1" /></label>
          <label>Height<input data-prop="height" class="input" type="number" step="1" min="1" /></label>
          <label>ScaleX<input data-prop="scaleX" class="input" type="number" step="0.01" /></label>
          <label>ScaleY<input data-prop="scaleY" class="input" type="number" step="0.01" /></label>
          <label>Rotation<input data-prop="rotation" class="input" type="number" step="1" /></label>
          <label>Alpha<input data-prop="alpha" class="input" type="number" step="0.01" min="0" max="1" /></label>
          <label>zIndex<input data-prop="zIndex" class="input" type="number" step="1" /></label>
          <label>OriginX<input data-prop="originX" class="input" type="number" step="0.01" min="0" max="1" /></label>
          <label>OriginY<input data-prop="originY" class="input" type="number" step="0.01" min="0" max="1" /></label>
          <label>Visible<select data-prop="visible" class="input"><option value="true">true</option><option value="false">false</option></select></label>
          <label>FlipX<select data-prop="flipX" class="input"><option value="false">false</option><option value="true">true</option></select></label>
          <label>FlipY<select data-prop="flipY" class="input"><option value="false">false</option><option value="true">true</option></select></label>
        </div>

        <div class="panel-header">I/O</div>
        <div class="btn-group-vertical">
          <button id="saveJsonBtn" class="btn">Save JSON</button>
          <button id="copyJsonBtn" class="btn">Copy JSON</button>
          <button id="loadJsonBtn" class="btn">Import JSON</button>
          <button id="restoreLastBtn" class="btn">Restore Last</button>
        </div>

        <textarea id="jsonArea" class="json-area" placeholder="JSON import/export area"></textarea>
      </aside>
    </div>

    <script type="module" src="./js/editor.js"></script>
  </body>
</html>
